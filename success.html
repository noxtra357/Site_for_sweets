<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Заказ успешно оформлен!</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 100px; background: #faf9f6; }
        .box { display: inline-block; background: white; padding: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-radius: 8px; }
        a { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #27ae60; color: white; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="box">
        <h1 style="color: #27ae60;">Заказ принят! 🎉</h1>
        <p>Спасибо, <strong>{{ name }}</strong>. Мы свяжемся с вами в ближайшее время.</p>
        <p>Сумма к оплате: <strong>{{ total }} KGS</strong></p>
        <a href="/">Вернуться на главную</a>
    </div>
</body>
</html>
